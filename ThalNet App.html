<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ThalNet — Blood Warriors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #F9FAFB; color: #111827; }
    h1,h2,h3,p { margin: 0; }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    .ms { font-family: "Material Symbols Rounded"; font-weight: 400; line-height: 1; font-feature-settings: "liga"; -webkit-font-feature-settings: "liga"; display: inline-flex; user-select: none; }
    .ms.fill { font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24; }
    .tnum { font-variant-numeric: tabular-nums; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 99px; border: 2px solid transparent; background-clip: content-box; }
    input:focus, select:focus { outline: 2px solid #B91C1C; outline-offset: 1px; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .6; transform: scale(1.15); } }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    @media (max-width: 900px) { .tn-two { grid-template-columns: 1fr !important; } .tn-stat-grid { grid-template-columns: repeat(3, 1fr) !important; } }
    @media (max-width: 560px) { .tn-stat-grid { grid-template-columns: repeat(2, 1fr) !important; } }
  </style>
</head>
<body>
<div id="root"></div>

<script src="thalnet-data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="thalnet-shared.jsx"></script>
<script type="text/babel" src="thalnet-dashboard.jsx"></script>
<script type="text/babel" src="thalnet-map.jsx"></script>
<script type="text/babel" src="thalnet-supply.jsx"></script>
<script type="text/babel" src="thalnet-patients.jsx"></script>
<script type="text/babel" src="thalnet-donors.jsx"></script>
<script type="text/babel" src="command-center.jsx"></script>
<script type="text/babel" src="auth-modal.jsx"></script>
<script type="text/babel" src="patient-onboarding.jsx"></script>
<script type="text/babel" src="thalnet-tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { useTweaks } = window;
const { TWEAK_DEFAULTS } = window;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState("dashboard");
  const [role, setRole] = useState("Admin");
  const [selected, setSelected] = useState(null);
  const [bridgePatient, setBridgePatient] = useState(null);
  const [authenticated, setAuthenticated] = useState(true); // Skip auth, go straight to dashboard

  useEffect(() => { window.scrollTo(0, 0); }, [page]);

  const handleSetPage = (p) => {
    // reset sub-views when navigating to top-level pages
    if (["dashboard","patients","donors","supply","map","command-center"].includes(p)) {
      setSelected(null);
      setBridgePatient(null);
    }
    setPage(p);
  };

  const handleBridge = (patient) => {
    setBridgePatient(patient);
    setPage("bridge");
  };

  const handleAuthSuccess = () => {
    setAuthenticated(true);
    setPage("dashboard");
  };

  const handleSetRole = (newRole) => {
    setRole(newRole);
  };

  if (!authenticated) {
    return (
      <>
        <AuthModal onSuccess={handleAuthSuccess} onRole={handleSetRole} />
        <ThalNetTweaks tweaks={tweaks} setTweak={setTweak} />
      </>
    );
  }

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <Navbar
        page={["dashboard","patients","donors","supply","map","command-center"].includes(page) ? page : page.includes("patient") ? "patients" : page.includes("donor") ? "donors" : page}
        setPage={handleSetPage}
        role={role}
        setRole={handleSetRole}
      />
      <main style={{ flex: 1 }}>
        {page === "dashboard"      && <Dashboard setPage={handleSetPage} setSelected={setSelected} tweaks={tweaks} />}
        {page === "map"            && <MapPage tweaks={tweaks} />}
        {page === "supply"         && <SupplyPage tweaks={tweaks} />}
        {page === "patients"       && <PatientsPage setPage={setPage} setSelected={setSelected} tweaks={tweaks} />}
        {page === "patient-detail" && <PatientDetail patient={selected} onBack={() => setPage("patients")} onBridge={handleBridge} tweaks={tweaks} />}
        {page === "donors"         && <DonorsPage setPage={setPage} setSelected={setSelected} tweaks={tweaks} />}
        {page === "donor-detail"   && <DonorDetail donor={selected} onBack={() => setPage("donors")} tweaks={tweaks} />}
        {page === "bridge"         && <BridgeBuilder patient={bridgePatient || selected} onBack={() => setPage(bridgePatient ? "patient-detail" : "patients")} tweaks={tweaks} />}
        {page === "command-center" && <CommandCenter tweaks={tweaks} setTweak={setTweak} />}
      </main>
      <ThalNetTweaks tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
